name: GitHub Release & Tag Cleaner

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true
    inputs:
      RELEASE_CLEANUP_PATTERN:
        required: false
        default: '[\s\S]*'
        type: string
jobs:
  release-cleanup:
    name: GitHub Cleanup
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Delete Older Releases
        uses: nikhilbadyal/ghaction-rm-releases@0a58d2ce5d2bf162d18e6c01712cc0e53b2bab45 # v0.8.0
        with:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_PATTERN: ${{ inputs.RELEASE_CLEANUP_PATTERN }}
